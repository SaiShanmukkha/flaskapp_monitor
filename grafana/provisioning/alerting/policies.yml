apiVersion: 1

policies:
  - orgId: 1
    receiver: slack-alerts
    group_by:
      - alertname
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 1h
    routes:
      - receiver: slack-alerts
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 30m
      - receiver: slack-alerts
        matchers:
          - severity = warning
        group_wait: 30s
        repeat_interval: 1h
